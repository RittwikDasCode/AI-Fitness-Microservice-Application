server.port=8087

# Eureka client configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8181/realms/fitness-app/protocol/openid-connect/certs

# =====================================================================
# SPRING BOOT 4.x / GATEWAY 5.x EXPLICIT ROUTING DEFINITION
# =====================================================================
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/users/**

#----------------------------------------------------------------------
spring.cloud.gateway.server.webflux.routes[1].id=activity-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ACTIVITY-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/activities/**

#----------------------------------------------------------------------
spring.cloud.gateway.server.webflux.routes[2].id=ai-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://AI-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/recommendations/**

# =====================================================================
# ACTUATOR FIX FOR SPRING BOOT 4+
# =====================================================================
# 1. Enable the gateway endpoint infrastructure
management.endpoint.gateway.enabled=true

# 2. Grant read access to the endpoint (CRITICAL to fix your 404 error)
management.endpoint.gateway.access=unrestricted

# 3. Expose it over the HTTP network
management.endpoints.web.exposure.include=gateway,health,info

# CORS Configuration
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true