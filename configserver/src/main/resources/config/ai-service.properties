
server.port=8084

spring.data.mongodb.uri=mongodb://localhost:27017/fitnessmicroai
spring.data.mongodb.database=fitnessmicroai

# Eureka client configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Kafka broker connection
spring.kafka.bootstrap-servers=localhost:9092

# Consumer configuration
spring.kafka.consumer.group-id=activity-processor-group
spring.kafka.consumer.auto-offset-reset=earliest

# 1. Use StringDeserializer for keys
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# 2. Wrap the value deserializer in ErrorHandlingDeserializer to stop the infinite loop
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# 3. Delegate the actual JSON parsing to the JsonDeserializer
spring.kafka.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# 4. Corrected: Tell the consumer to completely ignore the producer's '__TypeId__' header
spring.kafka.properties.spring.json.use.type.headers=false

# 5. Tell the deserializer exactly which local class to map the data into
spring.kafka.properties.spring.json.value.default.type=com.fitness.aiservice.model.Activity

# 6. Trust the local package for deserialization
spring.kafka.properties.spring.json.trusted.packages=com.fitness.aiservice.model

# Kafka topic configuration
kafka.topic.name=activity-events

gemini.api.url=${GEMINI_URL}
gemini.api.key=${GEMINI_KEY}

eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}